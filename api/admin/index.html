<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loha Studio Pro - Quản lý License</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; color: #333; }
.container { max-width: 1100px; margin: 0 auto; }
.card { background: white; border-radius: 10px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
h2 { margin-bottom: 15px; color: #2d3748; }
input, select { padding: 10px 14px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
input:focus { outline: none; border-color: #4a90d9; }
.btn { padding: 10px 20px; border: none; border-radius: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
.btn-primary { background: #4a90d9; color: white; }
.btn-primary:hover { background: #3a7bc8; }
.btn-danger { background: #e53e3e; color: white; font-size: 12px; padding: 6px 12px; }
.btn-danger:hover { background: #c53030; }
.btn-success { background: #38a169; color: white; }
.btn-success:hover { background: #2f855a; }
.row { display: flex; gap: 12px; align-items: end; flex-wrap: wrap; margin-bottom: 12px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 12px; color: #666; font-weight: 600; }
.result { background: #f7fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; margin-top: 12px; font-family: monospace; font-size: 13px; white-space: pre-wrap; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f7fafc; padding: 10px 8px; text-align: left; border-bottom: 2px solid #e2e8f0; font-weight: 600; }
td { padding: 10px 8px; border-bottom: 1px solid #eee; }
tr:hover { background: #f7fafc; }
.status-active { color: #38a169; font-weight: 600; }
.status-expired { color: #e53e3e; font-weight: 600; }
.info { font-size: 13px; color: #718096; margin-bottom: 10px; }
.search-row { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; justify-content: space-between; }
.pagination { display: flex; gap: 8px; justify-content: center; margin-top: 15px; }
.pagination button { padding: 6px 14px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; }
.pagination button.active { background: #4a90d9; color: white; border-color: #4a90d9; }
#login-section { text-align: center; padding: 60px 20px; }
#admin-section { display: none; }
</style>
</head>
<body>
<div class="container">

<!-- Login -->
<div id="login-section" class="card">
  <h2>Quản lý License - Loha Studio Pro</h2>
  <br>
  <div class="row" style="justify-content:center">
    <input type="password" id="admin-key" placeholder="Nhập Admin Key" style="width:350px">
    <button class="btn btn-primary" onclick="login()">Kết nối</button>
  </div>
  <div id="login-error" style="color:red;margin-top:10px"></div>
</div>

<!-- Admin Dashboard -->
<div id="admin-section">

  <!-- Create Key -->
  <div class="card">
    <h2>Tạo key</h2>
    <div class="row">
      <div class="field">
        <label>Số ngày hiệu lực</label>
        <input type="number" id="days" value="30" style="width:100px">
      </div>
      <div class="field">
        <label>Số điện thoại (gắn vào key)</label>
        <input type="text" id="phone" placeholder="0901234567" style="width:200px">
      </div>
      <button class="btn btn-success" onclick="createKey()">Tạo key</button>
    </div>
    <div id="create-result" class="result" style="display:none"></div>
  </div>

  <!-- Key List -->
  <div class="card">
    <div class="search-row">
      <div>
        <h2 style="display:inline">Danh sách license</h2>
        <span id="total-info" class="info" style="margin-left:10px"></span>
      </div>
      <div style="display:flex;gap:8px">
        <input type="text" id="search-input" placeholder="Tìm theo phone / key" style="width:250px">
        <button class="btn btn-primary" onclick="loadKeys()">Tìm</button>
        <button class="btn btn-primary" onclick="document.getElementById('search-input').value='';loadKeys()">Refresh</button>
      </div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Key</th>
          <th>Phone</th>
          <th>Hết hạn</th>
          <th>Status</th>
          <th>Device</th>
          <th>Last seen</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="key-table"></tbody>
    </table>
  </div>

</div>
</div>

<script>
const API = window.location.origin + '/api';
let adminKey = '';

function login() {
  adminKey = document.getElementById('admin-key').value;
  fetch(API + '/admin/list', { headers: { 'Authorization': 'Bearer ' + adminKey } })
    .then(r => r.json())
    .then(data => {
      if (data.error) {
        document.getElementById('login-error').textContent = 'Admin key sai!';
      } else {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('admin-section').style.display = 'block';
        renderKeys(data);
      }
    })
    .catch(() => document.getElementById('login-error').textContent = 'Lỗi kết nối server');
}

function createKey() {
  const days = parseInt(document.getElementById('days').value) || 30;
  const phone = document.getElementById('phone').value.trim();
  if (!phone) { alert('Nhập số điện thoại!'); return; }

  // Generate key: LOHA-{phone}-{random}
  const rand = Math.random().toString(36).substring(2, 8).toUpperCase();
  const key = 'LOHA-' + phone + '-' + rand;

  // Calculate expire date
  const expire = new Date();
  expire.setDate(expire.getDate() + days);
  const expireStr = expire.toISOString().split('T')[0];

  fetch(API + '/admin/create', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + adminKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, expire: expireStr, phone })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      const el = document.getElementById('create-result');
      el.style.display = 'block';
      el.innerHTML = '<b>Key vừa tạo (copy gửi cho khách):</b>\n\nkey: <b>' + key + '</b>\nexpires: <b>' + expireStr + '</b>\nphone: ' + phone;
      loadKeys();
    } else {
      alert('Lỗi: ' + JSON.stringify(data));
    }
  });
}

function loadKeys() {
  const search = document.getElementById('search-input').value.trim().toLowerCase();
  fetch(API + '/admin/list', { headers: { 'Authorization': 'Bearer ' + adminKey } })
    .then(r => r.json())
    .then(data => {
      if (search) {
        data.keys = data.keys.filter(k =>
          (k.key || '').toLowerCase().includes(search) ||
          (k.phone || '').includes(search)
        );
        data.total = data.keys.length;
      }
      renderKeys(data);
    });
}

function renderKeys(data) {
  document.getElementById('total-info').textContent = 'Tổng: ' + data.total + ' key(s)';
  const tbody = document.getElementById('key-table');
  tbody.innerHTML = '';

  // Sort by created_at desc
  const keys = (data.keys || []).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

  keys.forEach(k => {
    const now = new Date();
    const exp = new Date(k.expire);
    const isExpired = now > exp;
    const status = isExpired ? '<span class="status-expired">expired</span>' : '<span class="status-active">active</span>';
    const device = k.device_id ? k.device_id.substring(0, 12) + '...' : '-';
    const lastSeen = k.last_seen ? new Date(k.last_seen).toLocaleString('vi-VN') : '-';
    const expireStr = new Date(k.expire).toLocaleDateString('vi-VN');
    const keyShort = k.key.length > 20 ? k.key.substring(0, 8) + '...' + k.key.substring(k.key.length - 6) : k.key;

    tbody.innerHTML += '<tr>' +
      '<td title="' + k.key + '">' + keyShort + '</td>' +
      '<td>' + (k.phone || '-') + '</td>' +
      '<td>' + expireStr + '</td>' +
      '<td>' + status + '</td>' +
      '<td title="' + (k.device_id || '') + '">' + device + '</td>' +
      '<td>' + lastSeen + '</td>' +
      '<td>' +
        '<button class="btn btn-danger" onclick="resetDevice(\'' + k.key + '\')">Reset</button> ' +
        '<button class="btn btn-danger" onclick="deleteKey(\'' + k.key + '\')">Xoá</button>' +
      '</td>' +
      '</tr>';
  });
}

function resetDevice(key) {
  if (!confirm('Reset device cho key: ' + key + '?')) return;
  fetch(API + '/admin/reset', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + adminKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ key })
  }).then(() => loadKeys());
}

function deleteKey(key) {
  if (!confirm('Xoá key: ' + key + '?')) return;
  fetch(API + '/admin/delete', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + adminKey, 'Content-Type': 'application/json' },
    body: JSON.stringify({ key })
  }).then(() => loadKeys());
}
</script>
</body>
</html>
